spring.application.name=coaching
spring.ai.openai.api-key=${OPEN_ROUTER_API_KEY}
spring.ai.openai.chat.options.model=openai/gpt-oss-20b:free
spring.ai.openai.base-url=https://openrouter.ai/api/v1

# DevTools: exclude graph package from restart to avoid classloader issues
spring.devtools.restart.exclude=com.interview.ai.coaching.graph.**,org.bsc.langgraph4j.**

# Increase server timeout
server.tomcat.connection-timeout=60000
server.tomcat.max-http-form-post-size=10485760
